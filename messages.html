<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teacher Messages | Hablawithflow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  >
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body class="portal-app teacher-dashboard-app teacher-portal-v2">
  <main class="teacher-dashboard-shell">
    <div id="admin-dashboard" class="teacher-dashboard-app-shell" hidden>
      <aside class="teacher-dashboard-sidebar" id="teacher-dashboard-sidebar" aria-label="Teacher navigation">
        <div class="teacher-sidebar-brand">
          <div class="teacher-sidebar-brand-row">
            <div class="teacher-sidebar-brand-copy">
              <div class="teacher-sidebar-logo" aria-label="Teacher profile">
                <span>Hablawithflow</span>
              </div>
              <span class="teacher-sidebar-kicker">Teacher Portal</span>
            </div>
            <button class="teacher-sidebar-brand-toggle" type="button" data-sidebar-toggle aria-controls="teacher-dashboard-sidebar" aria-expanded="false" aria-label="Fold sidebar">&lt;</button>
          </div>
        </div>

        <p class="teacher-sidebar-section-label">Menu</p>

        <nav class="teacher-sidebar-nav" aria-label="Teacher navigation links">
          <a class="teacher-app-nav-link" href="admin.html">
            <span class="teacher-nav-icon" aria-hidden="true">D</span>
            <span>Dashboard</span>
          </a>
          <a class="teacher-app-nav-link" href="teacher-calendar.html">
            <span class="teacher-nav-icon" aria-hidden="true">C</span>
            <span>Calendar</span>
          </a>
          <a class="teacher-app-nav-link" href="teacher-students.html">
            <span class="teacher-nav-icon" aria-hidden="true">S</span>
            <span>Students</span>
          </a>
          <a class="teacher-app-nav-link active" href="messages.html" aria-current="page">
            <span class="teacher-nav-icon" aria-hidden="true">M</span>
            <span>Messages</span>
          </a>
          <a class="teacher-app-nav-link" href="teacher-wallet.html">
            <span class="teacher-nav-icon" aria-hidden="true">W</span>
            <span>Wallet</span>
          </a>
          <a class="teacher-app-nav-link" href="teacher-profile.html">
            <span class="teacher-nav-icon" aria-hidden="true">P</span>
            <span>Profile</span>
          </a>
          <a class="teacher-app-nav-link" href="teacher-settings.html">
            <span class="teacher-nav-icon" aria-hidden="true">SE</span>
            <span>Settings</span>
          </a>
        </nav>

        <div class="teacher-sidebar-footer">
          <button class="teacher-app-nav-link" type="button" id="teacher-logout">
            <span class="teacher-nav-icon" aria-hidden="true">LO</span>
            <span>Log Out</span>
          </button>
        </div>
        <button class="teacher-sidebar-edge-toggle" type="button" data-sidebar-toggle aria-controls="teacher-dashboard-sidebar" aria-expanded="false" aria-label="Fold sidebar">&lt;</button>
      </aside>
      <button class="teacher-sidebar-backdrop" id="teacher-sidebar-backdrop" type="button" aria-label="Close navigation"></button>

      <div class="teacher-dashboard-main">
        <header class="teacher-dashboard-topbar">
          <div>
            <p class="teacher-topbar-kicker">WhatsApp-style Inbox</p>
            <h1 class="teacher-topbar-title">Messages</h1>
          </div>
          <div class="teacher-topbar-tools">
            <span class="teacher-date-chip" id="teacher-dashboard-date">Date</span>
            <div class="teacher-topbar-identity">
              <strong id="teacher-topbar-name">Teacher</strong>
              <span id="teacher-topbar-role">Educator</span>
            </div>
            <button class="teacher-avatar-toggle" type="button" data-sidebar-toggle aria-controls="teacher-dashboard-sidebar" aria-expanded="false" aria-label="Toggle navigation">
              <img id="teacher-sidebar-avatar-image" data-teacher-avatar src="https://images.unsplash.com/photo-1521572267360-ee0c2909d518?auto=format&fit=crop&w=200&q=80" alt="Teacher profile">
            </button>
          </div>
        </header>

        <section class="messages-shell messages-shell-v2">
          <div class="messages-container whatsapp-layout">
            <aside class="messages-sidebar whatsapp-sidebar">
              <div class="messages-sidebar-header whatsapp-sidebar-header">
                <div>
                  <span class="section-kicker">Inbox</span>
                  <h2>Conversations</h2>
                </div>
                <input type="search" id="conversations-search" class="conversations-search" placeholder="Search conversations...">
                <div class="booking-feedback messages-sidebar-feedback" id="conversation-start-feedback" hidden></div>
              </div>
              <div class="conversations-list whatsapp-conversations-list" id="conversations-list"></div>
            </aside>

            <div class="messages-content whatsapp-chat-content">
              <div class="chat-empty whatsapp-chat-empty" id="chat-empty">
                <div class="chat-empty-icon">M</div>
                <p class="chat-empty-title">No conversation selected</p>
                <p class="chat-empty-text">Choose a student from the left to open the chat.</p>
              </div>

              <div class="chat-thread whatsapp-chat-thread" id="chat-thread" hidden>
                <div class="chat-header whatsapp-chat-header">
                  <div class="whatsapp-chat-person">
                    <div class="whatsapp-chat-avatar" id="chat-user-avatar">S</div>
                    <div>
                      <h3 id="chat-user-name">Conversation</h3>
                      <p id="chat-user-role" class="chat-user-role"></p>
                    </div>
                  </div>
                </div>

                <div class="chat-messages-scroll whatsapp-chat-scroll" id="chat-messages-scroll">
                  <div class="chat-messages" id="chat-messages"></div>
                </div>

                <div class="chat-input-area whatsapp-chat-input-area">
                  <div class="booking-feedback" id="message-error" hidden></div>
                  <div class="chat-input-form whatsapp-composer">
                    <textarea id="message-input" class="message-textarea" placeholder="Type a message..." rows="2"></textarea>
                    <button id="send-message-btn" class="btn-submit" type="button">Send</button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </section>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/supabase-client.js"></script>
  <script src="assets/js/app-config.js"></script>
  <script src="assets/js/legal-consent.js"></script>
  <script src="assets/js/email-api.js"></script>
  <script src="assets/js/portal-data.js"></script>
  <script src="assets/js/admin-portal.js"></script>
  <script src="assets/js/messages.js"></script>
</body>
</html>
